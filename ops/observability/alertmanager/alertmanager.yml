# Webhook payloads include Prometheus rule annotations (e.g. runbook_url from ops/observability/prometheus/alerts.yml).
global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: "default"
    webhook_configs:
      - url: "http://host.docker.internal:5001/alerts"
        send_resolved: true
