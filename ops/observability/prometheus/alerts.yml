# runbook_url: GitHub browser links (afbuyers/masque-server); fork deployments may override via recording rules or sed.
groups:
  - name: masque-server-alerts
    rules:
      - alert: MasqueConnectFailureRateHigh
        expr: |
          (
            sum(rate(masque_connect_failures_total[5m]))
            /
            clamp_min(sum(rate(masque_connect_requests_total[5m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "MASQUE connect failure rate is high"
          description: "Connect failure rate has been above 5% for 5 minutes."
          runbook_url: "https://github.com/afbuyers/masque-server/blob/main/docs/runbooks/m4-production-readiness-checklist.md"

      - alert: MasqueConnectLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(masque_connect_latency_seconds_bucket[5m])) by (le)
          ) > 0.8
        for: 5m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "MASQUE connect latency p95 is high"
          description: "Connect latency p95 has been above 800ms for 5 minutes."
          runbook_url: "https://github.com/afbuyers/masque-server/blob/main/docs/runbooks/m4-production-readiness-checklist.md"

      - alert: MasqueAuthorizeLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(masque_authorize_latency_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "MASQUE control-plane authorize latency p95 is high"
          description: "POST /api/v1/server/authorize RTT p95 has been above 500ms for 5 minutes (check control-plane load and network)."
          runbook_url: "https://github.com/afbuyers/masque-server/blob/main/docs/runbooks/m4-production-readiness-checklist.md"

      - alert: MasqueConnectIPRoutePushACLDenied
        expr: |
          sum(rate(masque_connect_ip_route_push_total{result="acl_denied"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "CONNECT-IP proactive route push denied by ACL"
          description: "CONNECT_IP_ROUTE_ADV_CIDR is set, but route pushes have been denied by device ACL for 10 minutes."
          runbook_url: "https://github.com/afbuyers/masque-server/blob/main/README.zh.md"

      - alert: MasqueConnectIPRoutePushInvalidCIDR
        expr: |
          sum(rate(masque_connect_ip_route_push_total{result="invalid_cidr"}[10m])) > 0
        for: 5m
        labels:
          severity: critical
          service: masque-server
        annotations:
          summary: "CONNECT-IP proactive route push CIDR is invalid"
          description: "CONNECT_IP_ROUTE_ADV_CIDR is malformed; proactive ROUTE_ADVERTISEMENT cannot be sent."
          runbook_url: "https://github.com/afbuyers/masque-server/blob/main/README.zh.md"

      - alert: MasqueConnectIPTunOpenEchoFallback
        expr: |
          sum(rate(masque_connect_ip_tun_open_echo_fallback_total[5m])) > 0
        for: 10m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "CONNECT-IP TUN forward enabled but host TUN open failed (echo fallback)"
          description: "CONNECT_IP_TUN_FORWARD is on but per-session /dev/net/tun open keeps failing (check CAP_NET_ADMIN/root, device node, or CONNECT_IP_TUN_NAME)."
          runbook_url: "https://github.com/afbuyers/masque-server/blob/main/docs/runbooks/connect-ip-tun-forward-linux.md"

      - alert: MasqueConnectIPTunLinkUpFailures
        expr: |
          sum(rate(masque_connect_ip_tun_link_up_failures_total[5m])) > 0
        for: 10m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "CONNECT-IP TUN link-up command failed"
          description: "CONNECT_IP_TUN_LINK_UP is enabled but ip link set up is failing (check ip(8) in PATH and CAP_NET_ADMIN/root)."
          runbook_url: "https://github.com/afbuyers/masque-server/blob/main/docs/runbooks/connect-ip-tun-forward-linux.md"

      - alert: MasqueConnectIPTunManagedNATApplyErrors
        expr: |
          sum(rate(masque_connect_ip_tun_managed_nat_apply_total{result="error"}[5m])) > 0
        for: 10m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "CONNECT-IP managed NAT automation apply failed"
          description: "CONNECT_IP_TUN_MANAGED_NAT is enabled but ip_forward/iptables automation is failing (check CONNECT_IP_TUN_EGRESS_IFACE, iptables availability, and privileges)."
          runbook_url: "https://github.com/afbuyers/masque-server/blob/main/docs/runbooks/connect-ip-tun-forward-linux.md"

      - alert: MasqueConnectIPTunSharedBindingConflictsHigh
        expr: |
          sum(rate(masque_connect_ip_tun_shared_binding_conflicts_total[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "CONNECT-IP shared TUN IP-binding conflicts are high"
          description: "Shared TUN source-IP ownership is frequently changing across sessions; check overlapping client addressing and binding TTL."
          runbook_url: "https://github.com/afbuyers/masque-server/blob/main/docs/runbooks/connect-ip-tun-forward-linux.md"
