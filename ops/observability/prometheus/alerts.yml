groups:
  - name: masque-server-alerts
    rules:
      - alert: MasqueConnectFailureRateHigh
        expr: |
          (
            sum(rate(masque_connect_failures_total[5m]))
            /
            clamp_min(sum(rate(masque_connect_requests_total[5m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "MASQUE connect failure rate is high"
          description: "Connect failure rate has been above 5% for 5 minutes."

      - alert: MasqueConnectLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(masque_connect_latency_seconds_bucket[5m])) by (le)
          ) > 0.8
        for: 5m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "MASQUE connect latency p95 is high"
          description: "Connect latency p95 has been above 800ms for 5 minutes."

      - alert: MasqueAuthorizeLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(masque_authorize_latency_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "MASQUE control-plane authorize latency p95 is high"
          description: "POST /api/v1/server/authorize RTT p95 has been above 500ms for 5 minutes (check control-plane load and network)."

      - alert: MasqueConnectIPRoutePushACLDenied
        expr: |
          sum(rate(masque_connect_ip_route_push_total{result="acl_denied"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          service: masque-server
        annotations:
          summary: "CONNECT-IP proactive route push denied by ACL"
          description: "CONNECT_IP_ROUTE_ADV_CIDR is set, but route pushes have been denied by device ACL for 10 minutes."

      - alert: MasqueConnectIPRoutePushInvalidCIDR
        expr: |
          sum(rate(masque_connect_ip_route_push_total{result="invalid_cidr"}[10m])) > 0
        for: 5m
        labels:
          severity: critical
          service: masque-server
        annotations:
          summary: "CONNECT-IP proactive route push CIDR is invalid"
          description: "CONNECT_IP_ROUTE_ADV_CIDR is malformed; proactive ROUTE_ADVERTISEMENT cannot be sent."
