# Client E2E: Laravel control-plane + masque-server + activate + connect -dry-run
# Run from repo root: docker compose -f docker/e2e/docker-compose.yml up --build --abort-on-container-exit
services:
  control-plane:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.control-plane
    networks: [e2e]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 180s

  masque:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.masque
    environment:
      CONTROL_PLANE_URL: http://control-plane:8000
      LISTEN_ADDR: ":8443"
    depends_on:
      control-plane:
        condition: service_healthy
    networks: [e2e]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8443/healthz"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 30s

  e2e:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile.client-e2e
    environment:
      CONTROL_PLANE_URL: http://control-plane:8000
      MASQUE_SERVER_URL: http://masque:8443
      MASQUE_CLIENT_BIN: /usr/local/bin/masque-client
    depends_on:
      masque:
        condition: service_healthy
    networks: [e2e]

networks:
  e2e:
    driver: bridge
