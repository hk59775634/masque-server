name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_phase2b_kernel:
        description: "Run Phase 2b kernel-forward staging gate"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_authz_hmac_check:
        description: "Run control-plane authorize HMAC staging gate"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      authz_hmac_required_expected:
        description: "Expect unsigned /server/authorize to fail (1=true,0=false)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      run_multi_node_ha_check:
        description: "Run staging multi-node HA gate"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      expected_healthy_nodes:
        description: "Expected healthy masque-server targets in HA gate"
        required: false
        default: "2"
        type: string
      masque_node_urls:
        description: "Comma-separated masque node URLs for HA gate"
        required: false
        default: ""
        type: string
      masque_lb_url:
        description: "Optional masque LB URL for HA gate consistency check"
        required: false
        default: ""
        type: string
      strict_ha_no_unexpected:
        description: "HA gate: fail if Prometheus has extra healthy masque-server instances vs MASQUE_NODE_URLS"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      run_ipv4_scope_check:
        description: "Run IPv4-only scope guard (capabilities not_implemented) on masque"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      control_plane_url:
        description: "Staging control-plane base URL"
        required: false
        default: "https://www.afbuyers.com"
        type: string
      masque_server_url:
        description: "Staging masque-server base URL"
        required: false
        default: "http://127.0.0.1:8443"
        type: string
      prometheus_url:
        description: "Staging Prometheus base URL"
        required: false
        default: "http://127.0.0.1:9090"
        type: string
      alertmanager_url:
        description: "Staging Alertmanager base URL"
        required: false
        default: "http://127.0.0.1:9093"
        type: string
      loki_url:
        description: "Staging Loki base URL"
        required: false
        default: "http://127.0.0.1:3100"
        type: string
      grafana_url:
        description: "Staging Grafana base URL"
        required: false
        default: "http://127.0.0.1:3000"
        type: string

jobs:
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare sqlite
        run: |
          cp .env.example .env
          touch database/database.sqlite
      - name: Run tests
        run: php artisan test

  go-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [masque-server, linux-client]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Go test
        run: |
          go mod tidy
          go test ./...
      - name: Go build (inject version via ldflags)
        env:
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ROOT_DIR="${GITHUB_WORKSPACE}"
          # shellcheck source=scripts/deploy/go-build-flags.sh
          SOURCE_ROOT="${ROOT_DIR}" . "${ROOT_DIR}/scripts/deploy/go-build-flags.sh"
          go mod tidy
          if [[ "${{ matrix.component }}" == "linux-client" ]]; then
            PKG="./cmd/client"
          else
            PKG="./cmd/server"
          fi
          OUT="/tmp/${{ matrix.component }}-ci"
          go build -trimpath -ldflags "${GO_LDFLAGS}" -o "${OUT}" "${PKG}"
          echo "--- ${OUT} version ---"
          "${OUT}" version

  docker-e2e-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker Compose client E2E (activate + connect -dry-run)
        run: |
          set -euo pipefail
          docker compose -f docker/e2e/docker-compose.yml up --build --abort-on-container-exit --remove-orphans
          docker compose -f docker/e2e/docker-compose.yml down -v

  phase2b-kernel-staging:
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.run_phase2b_kernel == 'true' || inputs.run_authz_hmac_check == 'true' || inputs.run_multi_node_ha_check == 'true' || inputs.run_ipv4_scope_check == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run full-check with Phase 2b kernel-forward gate
        env:
          CONTROL_PLANE_URL: ${{ inputs.control_plane_url }}
          MASQUE_SERVER_URL: ${{ inputs.masque_server_url }}
          PROMETHEUS_URL: ${{ inputs.prometheus_url }}
          ALERTMANAGER_URL: ${{ inputs.alertmanager_url }}
          LOKI_URL: ${{ inputs.loki_url }}
          GRAFANA_URL: ${{ inputs.grafana_url }}
          RUN_PHASE2B_KERNEL: ${{ inputs.run_phase2b_kernel == 'true' && '1' || '0' }}
          RUN_AUTHZ_HMAC_CHECK: ${{ inputs.run_authz_hmac_check == 'true' && '1' || '0' }}
          AUTHZ_HMAC_REQUIRED_EXPECTED: ${{ inputs.authz_hmac_required_expected }}
          AUTHZ_HMAC_SECRET: ${{ secrets.STAGING_AUTHZ_HMAC_SECRET }}
          RUN_MULTI_NODE_HA_CHECK: ${{ inputs.run_multi_node_ha_check == 'true' && '1' || '0' }}
          EXPECTED_HEALTHY_NODES: ${{ inputs.expected_healthy_nodes }}
          MASQUE_NODE_URLS: ${{ inputs.masque_node_urls }}
          MASQUE_LB_URL: ${{ inputs.masque_lb_url }}
          STRICT_HA_NO_UNEXPECTED: ${{ inputs.strict_ha_no_unexpected == 'true' && '1' || '0' }}
          RUN_IPV4_SCOPE_CHECK: ${{ inputs.run_ipv4_scope_check == 'true' && '1' || '0' }}
          RUN_K6: "0"
          SKIP_LOKI: "0"
        run: |
          set -euo pipefail
          chmod +x scripts/staging/full-check.sh scripts/staging/phase2b-kernel-check.sh scripts/staging/authz-hmac-check.sh scripts/staging/multi-node-ha-check.sh scripts/staging/ipv4-dataplane-scope-check.sh
          ./scripts/staging/full-check.sh
