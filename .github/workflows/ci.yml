name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_phase2b_kernel:
        description: "Run Phase 2b kernel-forward staging gate"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      control_plane_url:
        description: "Staging control-plane base URL"
        required: false
        default: "https://www.afbuyers.com"
        type: string
      masque_server_url:
        description: "Staging masque-server base URL"
        required: false
        default: "http://127.0.0.1:8443"
        type: string
      prometheus_url:
        description: "Staging Prometheus base URL"
        required: false
        default: "http://127.0.0.1:9090"
        type: string
      alertmanager_url:
        description: "Staging Alertmanager base URL"
        required: false
        default: "http://127.0.0.1:9093"
        type: string
      loki_url:
        description: "Staging Loki base URL"
        required: false
        default: "http://127.0.0.1:3100"
        type: string
      grafana_url:
        description: "Staging Grafana base URL"
        required: false
        default: "http://127.0.0.1:3000"
        type: string

jobs:
  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare sqlite
        run: |
          cp .env.example .env
          touch database/database.sqlite
      - name: Run tests
        run: php artisan test

  go-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [masque-server, linux-client]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Go test
        run: |
          go mod tidy
          go test ./...
      - name: Go build (inject version via ldflags)
        env:
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ROOT_DIR="${GITHUB_WORKSPACE}"
          # shellcheck source=scripts/deploy/go-build-flags.sh
          SOURCE_ROOT="${ROOT_DIR}" . "${ROOT_DIR}/scripts/deploy/go-build-flags.sh"
          go mod tidy
          if [[ "${{ matrix.component }}" == "linux-client" ]]; then
            PKG="./cmd/client"
          else
            PKG="./cmd/server"
          fi
          OUT="/tmp/${{ matrix.component }}-ci"
          go build -trimpath -ldflags "${GO_LDFLAGS}" -o "${OUT}" "${PKG}"
          echo "--- ${OUT} version ---"
          "${OUT}" version

  docker-e2e-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker Compose client E2E (activate + connect -dry-run)
        run: |
          set -euo pipefail
          docker compose -f docker/e2e/docker-compose.yml up --build --abort-on-container-exit --remove-orphans
          docker compose -f docker/e2e/docker-compose.yml down -v

  phase2b-kernel-staging:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_phase2b_kernel == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run full-check with Phase 2b kernel-forward gate
        env:
          CONTROL_PLANE_URL: ${{ inputs.control_plane_url }}
          MASQUE_SERVER_URL: ${{ inputs.masque_server_url }}
          PROMETHEUS_URL: ${{ inputs.prometheus_url }}
          ALERTMANAGER_URL: ${{ inputs.alertmanager_url }}
          LOKI_URL: ${{ inputs.loki_url }}
          GRAFANA_URL: ${{ inputs.grafana_url }}
          RUN_PHASE2B_KERNEL: "1"
          RUN_K6: "0"
          SKIP_LOKI: "0"
        run: |
          set -euo pipefail
          chmod +x scripts/staging/full-check.sh scripts/staging/phase2b-kernel-check.sh
          ./scripts/staging/full-check.sh
