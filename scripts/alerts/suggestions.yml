MasqueConnectIPTunOpenEchoFallback:
  steps:
    - Check /dev/net/tun exists and masque-server has CAP_NET_ADMIN/root.
    - Verify CONNECT_IP_TUN_FORWARD=1 and CONNECT_IP_TUN_NAME (if set) are valid.
    - Inspect masque logs around 'tun forward unavailable' for exact errno.
  commands:
    - ls -l /dev/net/tun
    - systemctl show masque-server --property=Environment | tr ' ' '\n' | rg '^Environment='
    - journalctl -u masque-server -n 200 --no-pager | rg "tun forward unavailable|CONNECT_IP_TUN_FORWARD"

MasqueConnectIPTunLinkUpFailures:
  steps:
    - Verify ip(8) is present in PATH for the masque-server process.
    - Check CAP_NET_ADMIN/root; run manual `ip link set dev <tun> up` on host.
    - Confirm CONNECT_IP_TUN_LINK_UP is intended; disable if host manages link state.
  commands:
    - command -v ip
    - journalctl -u masque-server -n 200 --no-pager | rg "CONNECT_IP_TUN_LINK_UP|ip link set dev"
    - ip link show

MasqueConnectIPRoutePushInvalidCIDR:
  steps:
    - Validate CONNECT_IP_ROUTE_ADV_CIDR format and mask.
    - Confirm deployed env matches expected CIDR value (no trailing spaces).
  commands:
    - systemctl show masque-server --property=Environment | tr ' ' '\n' | rg "CONNECT_IP_ROUTE_ADV_CIDR"
    - journalctl -u masque-server -n 200 --no-pager | rg "route push|invalid_cidr|CONNECT_IP_ROUTE_ADV_CIDR"

MasqueConnectIPRoutePushACLDenied:
  steps:
    - Compare CONNECT_IP_ROUTE_ADV_CIDR range against device ACL allow.cidr.
    - Ensure both route start/end fall within one ACL rule (server policy rule).
  commands:
    - journalctl -u masque-server -n 200 --no-pager | rg "route push|acl_denied"
    - curl -sS http://127.0.0.1:8443/v1/masque/capabilities | jq '.tunnel.quic.connect_ip'

MasqueConnectIPTunManagedNATApplyErrors:
  steps:
    - Verify CONNECT_IP_TUN_EGRESS_IFACE points at the WAN-facing interface and exists at runtime.
    - Confirm nft or iptables is available per CONNECT_IP_TUN_NAT_BACKEND; check journal for apply failures.
    - Run scripts/deploy/dataplane-preflight.sh on the host after deploy.
  commands:
    - ip route show
    - journalctl -u masque-server -n 200 --no-pager | rg "managed NAT|nft|iptables|apply"
    - curl -sS --max-time 5 http://127.0.0.1:8443/metrics | rg "masque_connect_ip_tun_managed_nat_apply_total"

MasqueConnectIPTunManagedNATNftFallback:
  steps:
    - Inspect rate(masque_connect_ip_tun_managed_nat_backend_total{backend="nftables",result="fallback"}); nft apply is failing.
    - Ensure nft is installed, kernel supports nft, and ruleset updates are permitted (root/CAP_NET_ADMIN).
    - Temporarily allow iptables fallback only after fixing root cause; use scripts/vpn-nat-backend-fault-injection.sh to reproduce nft-only on staging.
  commands:
    - command -v nft; nft list ruleset 2>&1 | head -n 40
    - journalctl -u masque-server -n 200 --no-pager | rg "managed NAT|nft|fallback"
    - curl -sS --max-time 5 http://127.0.0.1:8443/metrics | rg "masque_connect_ip_tun_managed_nat_backend_total"

MasqueConnectIPTunSharedBindingConflictsHigh:
  steps:
    - Check shared TUN mode and overlapping client source addresses or ACL ranges.
    - Review binding TTL and logs for conflict reasons; segment clients if collisions are expected.
  commands:
    - journalctl -u masque-server -n 200 --no-pager | rg "shared|binding|conflict"
    - curl -sS --max-time 5 http://127.0.0.1:8443/metrics | rg "masque_connect_ip_tun_shared_binding"

MasqueConnectIPTunSharedBindingActiveReassignHigh:
  steps:
    - Same as shared binding conflicts; focus on live sessions reusing the same mapping (reason active_reassign).
    - Verify unique stable addressing per active tunnel where possible.
  commands:
    - journalctl -u masque-server -n 200 --no-pager | rg "shared|binding|conflict|active"
    - curl -sS --max-time 5 http://127.0.0.1:8443/metrics | rg "masque_connect_ip_tun_shared_binding_conflict_reasons_total"
